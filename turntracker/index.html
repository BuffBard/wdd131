<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turn Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="main.js"></script>
</head>
<body>
<header>
    <a href="#">
        <img id="logo"src="images/turntrackerlogo.png" alt="Site Logo">
    </a>
    <nav>
        <a href="#">Home</a>
        <a href="#">Non-functional</a>
        <button class="tracker-btn">Turn Tracker</button>
    </nav>
</header>
<section class="turn-banner">
    <h1>It is <span id="currentName">----------</span>'s Turn</h1>
</section>
<main>
    <aside class="current-character">
        <div class="portrait large">
            <img id="currentPortrait" src="" alt="">
        </div>
        <h2 id="currentCharacterName"></h2>
        <h3>CT</h3>
        <p id="currentCT"></p>
        <button id="nextTurn">Next Turn</button>
    </aside>
    <section class="initiative-order" id="initiativeContainer">
    </section>
</main>
<footer>
    <a href="https://github.com/BuffBard"class="github-link">GitHub</a>
    <div class="socials">
        <a href="#">
            <img src="images/discord.svg" alt="Discord">
        </a>
        <a href="#">
            <img src="images/instagram.svg" alt="Instagram">
        </a>
        <a href="#">
            <img src="images/x.svg" alt="Twitter">
        </a>
    </div>
</footer>
</body>
</html>
