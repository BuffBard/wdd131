<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link rel="stylesheet" href="char-card.css"/>
    <script src="char-card.js" defer></script>

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="A combat card for Snortleblat the Conqueror">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="A combat card for Snortleblat the Conqueror">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="eventForm/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/emerald.png">
</head>
<body>
    <div class="card">
        <img class="image" src="images/snortleblat.webp">
        <h1 class="name">Snortleblat</h1>
        <div class="stats">
            <p>Class: Swamp Beast Diplomat</p>
            <p id="cardLevel">Level: </p>
            <p id="cardHealth">Health: </p>
        </div>
        <button id="attacked">Attacked</button>  
        <button id="levelUp">Level Up</button> 
    </div>
</body>
</html>
